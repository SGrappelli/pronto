version: "3.8"

services:
  staging-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_OPTIONS=--max-old-space-size=1536
    container_name: pronto-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    ports:
      - '3001:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_DEPLOYMENT_MODE=saas
