services:
  # ── One-shot migration runner ──────────────────────────────────────────────
  # Runs all pending SQL migrations, then exits.
  # The app service will not start until this completes successfully.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: pronto-app:local
    command: node /app/scripts/migrate.js
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: 'no'

  # ── Main application (SaaS mode) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pronto-app:local
    restart: unless-stopped
    expose:
      - '3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_DEPLOYMENT_MODE=saas
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

networks:
  default:
    name: pronto_network
